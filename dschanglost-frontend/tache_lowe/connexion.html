<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DschangLost - Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-wrapper">

<div class="auth-container">
 <div class="side-panel bg-connexion">
    
    <div>
        <h2>Objets Égarés</h2>
        <p>Dschang</p>
    </div>

    <div style="text-align: center;">
        <h1>Bienvenue !</h1>
        <p>Connectez-vous pour gérer vos déclarations.</p>
    </div>

 </div>


    <div class="form-panel">
        <h1>Connexion</h1>
        <form action="mon-espace.html">
            <div class="form-group">
                <label>Email ou téléphone</label>
                <input type="text" placeholder="Entrez vos identifiants" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="Votre mot de passe" required>
            </div>
            <button type="submit" class="btn-auth">Se connecter</button>
            <div class="switch-link">
                Pas encore de compte ? <a href="inscription.html">Créer un compte</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
