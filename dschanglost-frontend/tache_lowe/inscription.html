<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DschangLost - Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-wrapper">

<div class="auth-container">
   <div class="side-panel bg-inscription">
    
    <div>
        <h2>Objets Égarés</h2>
        <p>Dschang</p>
    </div>

    <div style="text-align: center;">
        <h1>Rejoignez-nous</h1>
        <p>Créez un compte pour sécuriser vos objets trouvés ou perdus.</p>
    </div>
    
</div>

    <div class="form-panel">
        <h1>Inscription</h1>
        <form action="connexion.html">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" placeholder="Votre nom" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="exemple@mail.com" required>
            </div>
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" placeholder="6xx xxx xxx" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="8 caractères minimum" required>
            </div>
            <button type="submit" class="btn-auth">S'inscrire</button>
            <div class="switch-link">
                Déjà inscrit ? <a href="connexion.html">Se connecter</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
