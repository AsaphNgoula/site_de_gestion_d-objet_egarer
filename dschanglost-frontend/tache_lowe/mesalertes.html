<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DschangLost - Mes Alertes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Styles spécifiques aux pastilles de statut */
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            font-size: 0.85em;
            font-weight: bold;
        }
        .btn-delete {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .btn-delete:hover { background: #cc0000; }
    </style>
</head>
<body>

<div class="container">
    <div style="margin-bottom: 30px;">
        <a href="monespace.html" style="text-decoration: none; color: var(--bleu-acier);">← Retour à mon espace</a>
        <h1 style="margin-top: 10px;">Mes déclarations</h1>
    </div>

    <div class="panel" style="padding: 0; overflow: hidden;">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Objet</th>
                    <th>Quartier</th>
                    <th>Statut</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>12/04/2026</td>
                    <td>iPhone 13 Pro</td>
                    <td>Marché A</td>
                    <td><span class="status-badge" style="background: var(--en-cours);">En cours</span></td>
                    <td><button class="btn-delete">Supprimer</button></td>
                </tr>
                <tr>
                    <td>10/04/2026</td>
                    <td>Portefeuille noir</td>
                    <td>Campus UDsch</td>
                    <td><span class="status-badge" style="background: var(--retrouve);">Retrouvé</span></td>
                    <td><button class="btn-delete">Supprimer</button></td>
                </tr>
                <tr>
                    <td>15/04/2026</td>
                    <td>Clés de voiture</td>
                    <td>Carrefour Tchimfem</td>
                    <td><span class="status-badge" style="background: var(--en-attente);">En attente</span></td>
                    <td><button class="btn-delete">Supprimer</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
