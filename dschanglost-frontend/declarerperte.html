<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DschangLost - Déclarer une perte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Déclarer un objet perdu</h1>
    <p class="subtitle">Veuillez remplir le formulaire ci-dessous pour déclarer votre objet perdu.</p>

    <div class="flex-container">
        <div class="column-main">
            <div class="panel">
                <div class="panel-title">Informations sur l'objet</div>
                <form id="lostForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Catégorie<span class="required">*</span></label>
                            <select required>
                                <option value="" disabled selected>Sélectionner une catégorie</option>
                                <option>Électronique</option>
                                <option>Documents</option>
                                <option>Clés</option>
                                <option>Sacs</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nom de l'objet<span class="required">*</span></label>
                            <input type="text" placeholder="Ex. Téléphone..." required>
                        </div>
                    </div>

                    <div class="form-full-width">
                        <label>Description détaillée<span class="required">*</span></label>
                        <textarea placeholder="Couleur, marque, signes particuliers..." required></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Lieu de perte<span class="required">*</span></label>
                            <input type="text" placeholder="Ex: Marché A..." required>
                        </div>
                        <div class="form-group">
                            <label>Date de perte<span class="required">*</span></label>
                            <input type="date" required>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="column-side">
            <div class="panel">
                <div class="panel-title">Vos informations</div>
                <div class="form-full-width">
                    <label>Nom complet<span class="required">*</span></label>
                    <input type="text" placeholder="Votre nom" required>
                </div>
                <div class="form-full-width">
                    <label>Téléphone<span class="required">*</span></label>
                    <input type="tel" placeholder="6xx xxx xxx" required>
                </div>
                <div class="form-full-width">
                    <label>Email</label>
                    <input type="email" placeholder="exemple@gmail.com">
                </div>
                <button type="submit" form="lostForm" class="btn-submit">
                    &#10148; Soumettre la déclaration
                </button>
            </div>
        </div>
    </div>

    <div class="footer-note">
        &#128274; Vos informations sont sécurisées et ne seront pas partagées.
    </div>
</div>

</body>
</html>
